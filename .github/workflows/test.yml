name: test

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

# Story 1a.1 three-language test CI + sub-PR #4 CD. The go job embeds the
# frontend dist (go:embed) so it depends on the frontend build artifact
# (uploaded by the frontend job, downloaded into dist/ before go vet/test/build).
# build-image (docker build + GHCR push on main) and deploy (guarded on
# DEPLOY_TOKEN — AD-18 platform choice deferred) landed in sub-PR #4.
# Toolchains (go/rust/wasm-pack) are installed on the dev machine, so the go
# and wasm suites also run locally; this workflow remains the authoritative
# merge gate (CI is the source of truth for PR green).
permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - run: bun run typecheck
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # Story 1a.3 C3 fold: Playwright e2e runs in parallel with frontend/go/wasm.
  # webServer config in playwright.config.ts starts `npx vite` so no dependency
  # on the frontend build-artifact job. SwiftShader enables headless WebGL2.
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium --with-deps
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/

  go:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Go 1.25: modernc.org/sqlite v1.53.0 (sub-PR #5) sets `go 1.25.0`
          # in go.mod; the toolchain must be >= 1.25 or go vet/test/build refuse.
          go-version: "1.25"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - run: go vet ./...
      - run: go test ./...
      - name: build + smoke
        run: |
          go build -o /tmp/newsd .
          /tmp/newsd &
          sleep 1
          curl -sf http://localhost:8080/__health
          curl -sf http://localhost:8080/__version
          curl -sf http://localhost:8080/
          kill %1 2>/dev/null || true

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: wasm-pack test --node wasm

  # sub-PR #4: build the multi-stage Docker image. On feat/PR it only builds
  # (validates the Dockerfile); on main it also pushes to GHCR (GITHUB_TOKEN,
  # no manual secret). The image is a real deployable artifact — dist is baked
  # in via go:embed so the runtime stage carries only the binary.
  build-image:
    needs: [go, wasm]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (+ push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/jarontam/newsd:latest
            ghcr.io/jarontam/newsd:sha-${{ github.sha }}
          build-args: |
            VERSION=sha-${{ github.sha }}
          # TODO: add gha build cache (cache-from/to type=gha) for faster
          # bun/go rebuilds once build permission is confirmed.

  # sub-PR #4: deploy job runs on every main merge (AC L277 — "main 合并触发
  # 部署"). The actual platform-specific steps are guarded behind DEPLOY_TOKEN:
  # AD-18 defers the cloud-platform choice, so until a platform is selected and
  # its secret is configured, the job runs but skips with a notice. Adding the
  # secret later un-gates the real steps without touching Dockerfile/CI.
  deploy:
    needs: build-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (real steps — fill when platform chosen)
        if: ${{ env.DEPLOY_TOKEN != '' }}
        run: |
          echo "Deploying ghcr.io/jarontam/newsd:sha-${{ github.sha }} …"
          # TODO (AD-18 platform choice deferred): real deploy steps here.
          #   Fly.io:  flyctl deploy --image ghcr.io/jarontam/newsd:latest
          #   VPS:     ssh + docker pull + docker run (+ Caddy/Traefik for TLS)
          #   Requires the chosen platform's secret configured in repo secrets.
      - name: Skip (no platform secret yet)
        if: ${{ env.DEPLOY_TOKEN == '' }}
        run: |
          echo "::notice::DEPLOY_TOKEN not set — AD-18 platform choice still deferred. Image available at ghcr.io/jarontam/newsd:latest (pushed by build-image)."
